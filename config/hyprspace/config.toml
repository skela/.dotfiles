# Hyprspace starter config.
#
# This file is intentionally small. Hyprspace already provides opinionated built-in
# defaults for the dwindle-friendly layout behavior, so this file only contains the
# first shortcuts new users are likely to want immediately.
#
# For a fuller reference config, see: ~/.config/hyprspace/docs/default-config.toml
# For path rules, see: ~/.config/hyprspace/docs/README.md
# For all available config options and commands, see:
# https://nikitabobko.github.io/AeroSpace/guide
# https://nikitabobko.github.io/AeroSpace/commands

config-version = 2
start-at-login = false
# auto-reload-config = true 

after-startup-command = [
    'exec-and-forget borders active_color=0xff50bfcb inactive_color=0xff414550 width=8.0 hidpi=off',
]

# exec-on-workspace-change = [
#     '/bin/bash',
#     '-lc',
#     'sketchybar --trigger hyprspace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
# ]

[gaps]
inner.horizontal = 18
inner.vertical = 18
outer.left = 18
outer.right = 18
outer.bottom = 18
outer.top = [{ monitor."built-in" = 18 }, { monitor."main" = 48 }, 48]

# ---------- MAIN KEY BINDINGS -----------

[mode.main.binding]
alt-enter = 'new-window-or-open Ghostty'
alt-b= 'new-window-or-open "Firefox Developer Edition"'
alt-n= 'new-window-or-open Finder'
# cmd-m = 'new-window-or-open Music'

alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

alt-tab = 'focus-back-and-forth'
alt-shift-space = 'layout floating tiling'
alt-shift-semicolon = 'mode service'
alt-shift-slash = 'layout tiles horizontal vertical'
alt-shift-comma = 'layout accordion horizontal vertical'
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'
alt-m = 'fullscreen'
alt-f = 'macos-native-fullscreen'

# ---------- SERVICE MODE -----------

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
alt-shift-semicolon = 'mode main'

# ---------- WINDOW CONTROL -----------

[[on-window-detected]]
if.app-id = "com.apple.ScreenSharing"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.MobileSMS"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['layout floating']

[[on-window-detected]]
if.app-id = "com.microsoft.teams2"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.macpaw.CleanMyMac'
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.macpaw.CleanMyMac4"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.bitwarden.desktop"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.QuickTimePlayerX"
run = ["layout floating"]
